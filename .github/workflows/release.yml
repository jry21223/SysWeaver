name: 多平台编译与发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: 编译 ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: sysweaver-macos-arm64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: sysweaver-linux-x86_64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: sysweaver-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 缓存 cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: 编译 Release 版本
        run: cargo build --release --target ${{ matrix.target }}

      - name: 重命名二进制文件（Unix）
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/sysweaver ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: 重命名二进制文件（Windows）
        if: runner.os == 'Windows'
        run: copy target\${{ matrix.target }}\release\sysweaver.exe ${{ matrix.artifact }}
        shell: cmd

      - name: 获取二进制信息（Unix）
        if: runner.os != 'Windows'
        run: ls -lh ${{ matrix.artifact }}

      - name: 获取二进制信息（Windows）
        if: runner.os == 'Windows'
        run: dir ${{ matrix.artifact }}
        shell: cmd

      - name: 上传构件
        uses: actions/upload-artifact@v4
        with:
          name: sysweaver-${{ matrix.target }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: 创建 GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: 下载所有构件
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 整理发布文件
        run: |
          mkdir -p releases
          for dir in artifacts/*/; do
            for file in "$dir"*; do
              if [ -f "$file" ]; then
                cp "$file" releases/
              fi
            done
          done
          ls -lah releases/

      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          files: releases/*
          body: |
            # sysweaver Release

            此版本包含以下平台的二进制文件：
            - **macOS arm64 (Apple Silicon)** - `sysweaver-macos-arm64`
            - **Linux x86_64** - `sysweaver-linux-x86_64`
            - **Windows x86_64** - `sysweaver-windows-x86_64.exe`

            ## 使用方法

            ### macOS / Linux
            ```bash
            chmod +x sysweaver-macos-arm64
            ./sysweaver-macos-arm64 chat
            ```

            ### Windows
            ```cmd
            sysweaver-windows-x86_64.exe chat
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
