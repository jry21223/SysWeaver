name: 多平台编译与发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: 编译 ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: agent-unix-macos-arm64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: agent-unix-linux-x86_64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: agent-unix-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 缓存 cargo 注册表
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: 缓存 cargo 索引
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: 缓存 cargo 构建
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: 编译 Release 版本
        run: cargo build --release --target ${{ matrix.target }}

      - name: 重命名二进制文件（Unix）
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/agent-unix ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: 重命名二进制文件（Windows）
        if: runner.os == 'Windows'
        run: copy target\${{ matrix.target }}\release\agent-unix.exe ${{ matrix.artifact }}
        shell: cmd

      - name: 获取二进制信息
        run: |
          ls -lh ${{ matrix.artifact }} || dir ${{ matrix.artifact }}

      - name: 上传构件
        uses: actions/upload-artifact@v3
        with:
          name: agent-unix-${{ matrix.target }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: 创建 GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: 下载所有构件
        uses: actions/download-artifact@v3
        with:
          path: artifacts

      - name: 整理发布文件
        run: |
          mkdir -p releases
          for dir in artifacts/*/; do
            for file in "$dir"*; do
              if [ -f "$file" ]; then
                cp "$file" releases/
              fi
            done
          done
          ls -lah releases/

      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          files: releases/*
          body: |
            # Agent Unix Release

            此版本包含以下平台的二进制文件：
            - **macOS arm64 (Apple Silicon)** - `agent-unix-macos-arm64`
            - **Linux x86_64** - `agent-unix-linux-x86_64`
            - **Windows x86_64** - `agent-unix-windows-x86_64.exe`

            ## 使用方法

            ### macOS
            ```bash
            ./agent-unix-macos-arm64 chat
            ```

            ### Linux
            ```bash
            ./agent-unix-linux-x86_64 chat
            ```

            ### Windows
            ```cmd
            agent-unix-windows-x86_64.exe chat
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
